name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ── Backend Python ──────────────────────────────────────────────────────────
  backend:
    name: Backend (Python 3.12)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cumpleia_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/cumpleia_test
      SUPABASE_JWT_SECRET: ci-test-jwt-secret-cumpleia-2026
      ENVIRONMENT: test
      DEBUG: "false"
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Lint — ruff
        run: ruff check .

      - name: Formato — black
        run: black --check .

      - name: Aplicar migraciones
        shell: bash
        run: |
          set +e
          alembic upgrade head 2>&1 | tee /tmp/migration.log
          EXIT_CODE=${PIPESTATUS[0]}
          if [ $EXIT_CODE -ne 0 ]; then
            python3 - <<'PYEOF'
import urllib.request, json, os, sys
log = open('/tmp/migration.log').read() if os.path.exists('/tmp/migration.log') else 'no log file'
body = json.dumps({'body': '## CI: alembic upgrade head error\n```\n' + log[-3000:] + '\n```'})
req = urllib.request.Request(
    'https://api.github.com/repos/' + os.environ.get('GITHUB_REPOSITORY','') + '/commits/' + os.environ.get('GITHUB_SHA','') + '/comments',
    data=body.encode(),
    headers={'Authorization': 'token ' + os.environ.get('GH_TOKEN',''), 'Content-Type': 'application/json'},
    method='POST'
)
try:
    resp = urllib.request.urlopen(req)
    print('Comment posted:', resp.status)
except Exception as e:
    print('Failed to post comment:', e)
PYEOF
            exit $EXIT_CODE
          fi

      - name: Tests (incluye aislamiento multi-tenant)
        run: pytest tests/ -v --tb=short

  # ── Frontend Node.js ────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Node.js 20)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Instalar dependencias
        run: npm install

      - name: Lint — ESLint
        run: npm run lint

      - name: Formato — Prettier
        run: npx prettier --check .
        # TypeScript se valida durante el build de Next.js en producción.
        # Para CI ligero usamos ESLint + Prettier sin ejecutar el servidor.

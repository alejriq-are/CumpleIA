name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ── Backend Python ──────────────────────────────────────────────────────────
  backend:
    name: Backend (Python 3.12)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cumpleia_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/cumpleia_test
      SUPABASE_JWT_SECRET: ci-test-jwt-secret-cumpleia-2026
      ENVIRONMENT: test
      DEBUG: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Lint — ruff
        run: ruff check .

      - name: Formato — black
        run: black --check .

      - name: Debug — importaciones y conexión DB
        shell: bash
        run: |
          python3 - <<'EOF'
          import sys, traceback
          print("Python:", sys.version)

          try:
              import psycopg2
              print("psycopg2:", psycopg2.__version__)
          except Exception as e:
              print("ERROR psycopg2:", e); traceback.print_exc()

          try:
              from pgvector.sqlalchemy import Vector
              print("pgvector.sqlalchemy.Vector: OK")
          except Exception as e:
              print("ERROR pgvector:", e); traceback.print_exc()

          try:
              from app.db.base import Base
              import app.db.models
              print("app.db.models: OK")
          except Exception as e:
              print("ERROR app.db.models:", e); traceback.print_exc()

          try:
              from app.core.config import get_settings
              s = get_settings()
              url = s.database_url
              sync_url = url.replace("+asyncpg", "")
              print("Settings OK, sync URL:", sync_url[:60])
          except Exception as e:
              print("ERROR settings:", e); traceback.print_exc()

          try:
              import psycopg2
              conn = psycopg2.connect("postgresql://postgres:postgres@localhost:5432/cumpleia_test")
              cur = conn.cursor()
              cur.execute("SELECT version()")
              print("PostgreSQL:", cur.fetchone()[0])
              cur.execute("SELECT * FROM pg_available_extensions WHERE name = 'vector'")
              row = cur.fetchone()
              print("pgvector extension available:", row is not None)
              conn.close()
          except Exception as e:
              print("ERROR DB connection:", e); traceback.print_exc()
          EOF

      - name: Aplicar migraciones
        shell: bash
        run: |
          set +e
          alembic upgrade head 2>&1 | tee /tmp/migration.log
          EXIT_CODE=${PIPESTATUS[0]}
          if [ $EXIT_CODE -ne 0 ]; then
            {
              echo "## :x: alembic upgrade head — error"
              echo ""
              echo '```'
              cat /tmp/migration.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit $EXIT_CODE
          fi

      - name: Tests (incluye aislamiento multi-tenant)
        run: pytest tests/ -v --tb=short

  # ── Frontend Node.js ────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Node.js 20)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Instalar dependencias
        run: npm install

      - name: Lint — ESLint
        run: npm run lint

      - name: Formato — Prettier
        run: npx prettier --check .
        # TypeScript se valida durante el build de Next.js en producción.
        # Para CI ligero usamos ESLint + Prettier sin ejecutar el servidor.

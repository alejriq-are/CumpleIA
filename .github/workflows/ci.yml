name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ── Backend Python ──────────────────────────────────────────────────────────
  backend:
    name: Backend (Python 3.12)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cumpleia_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/cumpleia_test
      SUPABASE_JWT_SECRET: ci-test-jwt-secret-cumpleia-2026
      ENVIRONMENT: test
      DEBUG: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Lint — ruff
        run: ruff check .

      - name: Formato — black
        run: black --check .

      - name: Aplicar migraciones
        run: |
          alembic upgrade head 2>&1 | tee /tmp/migration.log
          exit ${PIPESTATUS[0]}

      - name: Postear error como commit comment (debug)
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LOG=$(tail -60 /tmp/migration.log 2>/dev/null || echo "no log")
          gh api repos/${{ github.repository }}/commits/${{ github.sha }}/comments \
            --method POST \
            --field body="## CI migration error (debug)
          \`\`\`
          ${LOG}
          \`\`\`"

      - name: Tests (incluye aislamiento multi-tenant)
        run: pytest tests/ -v --tb=short

  # ── Frontend Node.js ────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Node.js 20)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Instalar dependencias
        run: npm install

      - name: Lint — ESLint
        run: npm run lint

      - name: Formato — Prettier
        run: npx prettier --check .
        # TypeScript se valida durante el build de Next.js en producción.
        # Para CI ligero usamos ESLint + Prettier sin ejecutar el servidor.
